name: "CI: PR Policy"

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate branch name and linked issue
        uses: actions/github-script@v9
        with:
          script: |
            if (context.payload.pull_request.user.login === 'dependabot[bot]') {
              console.log('Skipping validation for Dependabot PR.');
              return;
            }
            const headRef = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || "";
            const pattern = /^(task|feat(ure)?|bug|refactor)\/(issue-)?\d+-[a-z0-9-]+$/;
            if (!pattern.test(headRef)) {
              core.setFailed(`Branch name "${headRef}" does not match required pattern: (task|feat|bug|refactor)/<ID>-<short-desc>`);
              return;
            }
            const issuePattern = /(Closes|Resolves|Fixes)\s+#\d+/i;
            if (!issuePattern.test(body)) {
              core.setFailed('PR body must include "Closes #<issue-number>", "Fixes #<issue-number>" or "Resolves #<issue-number>" linking to the issue.');
              return;
            }
