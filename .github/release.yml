# Categorizes auto-generated release notes (gh release create --generate-notes)
# by the standardized PR labels applied by .github/labeler.yml.
changelog:
  categories:
    - title: 🚀 New Features
      labels: [enhancement]
    - title: 🐛 Bug Fixes
      labels: [bug]
    - title: 🛠 Refactoring & Performance
      labels: [refactoring, performance]
    - title: 📚 Documentation
      labels: [documentation]
    - title: ⚙️ CI/CD
      labels: [ci-cd]
    - title: 📦 Dependencies
      labels: [dependencies]
    - title: Other Changes
      labels: ['*']
